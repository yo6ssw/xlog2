# F-Droid packaging recipe for the xlog2 Android client.
#
# This is the file to submit to https://gitlab.com/fdroid/fdroiddata as
#   metadata/ro.scripca.xlog2.yml
# It is kept here, versioned with the app, so the build steps stay in sync with
# the source. See android/fdroid/README.md for the submission procedure and the
# reviewer notes (native-dep downloads, versionCode bumps). Keep it in sync
# whenever the Android build changes.
#
# NOTE: no Summary/Description here on purpose. F-Droid sources the listing text
# (and changelog) from the upstream Fastlane metadata in android/app/fastlane/,
# read from the built commit — which is why `commit` must point at a tag that
# contains it and the buildserver libsodium fix (>= v0.6.6). fdroiddata's
# make-summary-translatable.py check
# rejects an inline Summary, and the contributor guidelines ask not to duplicate
# summary/description in fdroiddata when the repo carries Fastlane metadata.

Categories:
  - Connectivity
License: GPL-3.0-or-later
AuthorName: Adrian Scripca
AuthorEmail: benishor@gmail.com
WebSite: https://github.com/yo6ssw/hamtools
SourceCode: https://github.com/yo6ssw/xlog2
IssueTracker: https://github.com/yo6ssw/xlog2/issues
Changelog: https://github.com/yo6ssw/xlog2/releases

AutoName: XLOG2

RepoType: git
Repo: https://github.com/yo6ssw/xlog2.git

Builds:
  - versionName: 0.2.0
    versionCode: 2
    commit: v0.6.6
    subdir: android/app
    submodules: true          # multimaster mesh library lives in third_party/
    ndk: r26d                 # == 26.3.11579264, the ndkVersion in build.gradle.kts
    gradle:
      - yes
    prebuild:
      # Cross-compile the native deps the sync core needs (libsodium + sqlite).
      # QRZ (libcurl/TLS) is disabled — the app does QRZ lookups in Kotlin/OkHttp
      # — so the native core needs no network TLS stack. build-deps.sh fetches the
      # libsodium and sqlite source from their official sites and compiles them.
      - pushd ..
      - ./third_party/build-deps.sh --no-qrz --ndk "${ANDROID_NDK_HOME:-$ANDROID_NDK}"
      - popd

# The app's own version track (0.2.0 / code 2) is independent of the ecosystem's
# git tags (v0.6.x, shared with the desktop app). UpdateCheckMode: Tags reads the
# versionCode from android/app/build.gradle.kts at the newest tag, so a desktop-
# only release that does not bump the Android versionCode correctly yields no
# false update. Bump versionCode in build.gradle.kts on any release that should
# ship a new APK; add a matching Builds entry here (AutoUpdateMode is None because
# the app versionName does not equal the tag name).
AutoUpdateMode: None
UpdateCheckMode: Tags
CurrentVersion: 0.2.0
CurrentVersionCode: 2
