# F-Droid packaging recipe for the xlog2 Android client.
#
# This is the file to submit to https://gitlab.com/fdroid/fdroiddata as
#   metadata/ro.scripca.xlog2.yml
# It is kept here, versioned with the app, so the build steps stay in sync with
# the source. See android/fdroid/README.md for the submission procedure and the
# reviewer notes (native-dep downloads, versionCode bumps). Keep it in sync
# whenever the Android build changes.
#
# NOTE: no Summary/Description here on purpose. F-Droid sources the listing text
# (and changelog) from the upstream Fastlane metadata in android/app/fastlane/,
# read from the built commit — so the built commit must contain that metadata and
# the buildserver libsodium fix (v0.6.6+; the pinned hash below is v0.6.7).
# fdroiddata's make-summary-translatable.py check rejects an inline Summary, and
# the contributor guidelines ask not to duplicate summary/description in
# fdroiddata when the repo carries Fastlane metadata.

Categories:
  - Connectivity
License: GPL-3.0-or-later
AuthorName: Adrian Scripca
AuthorEmail: benishor@gmail.com
WebSite: https://github.com/yo6ssw/hamtools
SourceCode: https://github.com/yo6ssw/xlog2
IssueTracker: https://github.com/yo6ssw/xlog2/issues
Changelog: https://github.com/yo6ssw/xlog2/releases

AutoName: XLOG2

RepoType: git
Repo: https://github.com/yo6ssw/xlog2.git

Builds:
  - versionName: 0.6.7
    versionCode: 60700
    commit: 0050bbf6e5545dcb869d228adacaf485a4441382
    subdir: android/app
    submodules: true          # multimaster mesh library lives in third_party/
    ndk: r26d                 # == 26.3.11579264, the ndkVersion in build.gradle.kts
    sudo:
      # libsodium's autotools build needs `make`, which the F-Droid buildserver
      # image does not ship. (curl/unzip for the source fetches are present.)
      - apt-get update
      - apt-get install -y make
    gradle:
      - yes
    build:
      # Cross-compile the native deps the sync core needs (libsodium + sqlite),
      # then let the gradle step (above) build and link the app against them.
      # QRZ (libcurl/TLS) is disabled — the app does QRZ lookups in Kotlin/OkHttp
      # — so the native core needs no TLS stack. build-deps.sh fetches the
      # libsodium and sqlite source from their official sites and compiles them;
      # it reads ANDROID_NDK_HOME, which the buildserver sets for us. This runs in
      # `build` (not `prebuild`) so the compiled .a/.so are produced AFTER the
      # source scanner has run — no scanignore needed for build artifacts.
      - pushd ..
      - ./third_party/build-deps.sh --no-qrz
      - popd

# The Android app is versioned in lockstep with the ecosystem release tags
# (vX.Y.Z), so new releases build automatically: UpdateCheckMode Tags finds the
# newest tag and reads its versionCode from android/app/build.gradle.kts, and
# AutoUpdateMode Version adds a build for it. The manual build above pins a full
# commit hash; autoupdate-generated entries reference the tag.
AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: 0.6.7
CurrentVersionCode: 60700
