# F-Droid packaging recipe for the xlog2 Android client.
#
# This is the file to submit to https://gitlab.com/fdroid/fdroiddata as
#   metadata/ro.scripca.xlog2.yml
# It is kept here, versioned with the app, so the build steps stay in sync with
# the source. See android/fdroid/README.md for the submission procedure and the
# two things a reviewer is likely to ask about (native-dep downloads, versionCode
# bumps). Keep it in sync whenever the Android build changes.

Categories:
  - Connectivity
License: GPL-3.0-or-later
AuthorName: Adrian Scripca
AuthorEmail: benishor@gmail.com
WebSite: https://github.com/yo6ssw/hamtools
SourceCode: https://github.com/yo6ssw/xlog2
IssueTracker: https://github.com/yo6ssw/xlog2/issues
Changelog: https://github.com/yo6ssw/xlog2/releases

# Inline text so the listing renders on the first build regardless of the built
# commit. The Fastlane files under android/app/fastlane/ mirror this and take
# over (plus screenshots) once a built tag contains them.
Summary: Peer-to-peer amateur-radio field logbook that syncs with the xlog2 desktop
Description: |-
  xlog2 is an amateur-radio (ham) logging application. This is its mobile
  field-logging client: log QSOs (contacts) on your phone in the field and have
  them appear on your desktop station automatically — and vice-versa.

  The phone is not a separate logbook that you sync later. It is a third frontend
  over the very same C++ core as the xlog2 desktop app, so it joins the identical
  peer-to-peer sync mesh: a QSO logged anywhere gossips to every other node
  (desktop, headless xlog2-syncd, and other phones) over an encrypted LAN mesh,
  with no central server and no cloud account.

  Features:

  * Fast entry form built for the field — large Call field, live DXCC country /
    CQ / ITU / continent resolution, dupe detection, and band-from-frequency.
  * Peer-to-peer sync over the LAN, auto-discovered, as a foreground service.
    No server, no account, no cloud.
  * Trusted-peer model: the mesh will not sync your log until a peer explicitly
    trusts this node's identity key, so your log stays yours.
  * ADIF import and export through the system file picker.
  * Offline DXCC lookups from a bundled prefix table.
  * Optional USB HID Morse-paddle input for keying a networked CW station.

  Everything needed to log and sync works fully offline and free. Optional
  QRZ.com callsign lookups use your own QRZ account if you enter one; the app
  works without it.

RepoType: git
Repo: https://github.com/yo6ssw/xlog2.git

Builds:
  - versionName: 0.2.0
    versionCode: 2
    commit: v0.6.4
    subdir: android/app
    submodules: true          # multimaster mesh library lives in third_party/
    ndk: r26d                 # == 26.3.11579264, the ndkVersion in build.gradle.kts
    gradle:
      - yes
    prebuild:
      # Cross-compile the native deps the sync core needs (libsodium + sqlite).
      # QRZ (libcurl/TLS) is disabled — the app does QRZ lookups in Kotlin/OkHttp
      # — so the native core needs no network TLS stack. build-deps.sh fetches the
      # libsodium and sqlite source from their official sites and compiles them.
      - pushd ..
      - ./third_party/build-deps.sh --no-qrz --ndk "${ANDROID_NDK_HOME:-$ANDROID_NDK}"
      - popd

# The app's own version track (0.2.0 / code 2) is independent of the ecosystem's
# git tags (v0.6.x, shared with the desktop app). UpdateCheckMode: Tags reads the
# versionCode from android/app/build.gradle.kts at the newest tag, so a desktop-
# only release that does not bump the Android versionCode correctly yields no
# false update. Bump versionCode in build.gradle.kts on any release that should
# ship a new APK; add a matching Builds entry here (AutoUpdateMode is None because
# the app versionName does not equal the tag name).
AutoUpdateMode: None
UpdateCheckMode: Tags
CurrentVersion: 0.2.0
CurrentVersionCode: 2
