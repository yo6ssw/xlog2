<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e222b"/>
      <stop offset="100%" stop-color="#11141a"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9f43"/>
      <stop offset="50%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#48dbfb"/>
    </linearGradient>

    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" stroke="#2c313c" stroke-width="4" filter="url(#dropShadow)"/>

  <path d="M 416 380 C 416 430, 360 448, 300 448 C 380 430, 400 370, 390 320 C 410 340, 416 360, 416 380 Z" fill="#2c313c" opacity="0.3"/>

  <g opacity="0.15" stroke="#ffffff" stroke-width="2" stroke-linecap="round">
    <line x1="120" y1="340" x2="220" y2="340" />
    <line x1="120" y1="370" x2="190" y2="370" />
    <line x1="120" y1="400" x2="240" y2="400" />
  </g>

  <path d="M 160 140 L 320 380" stroke="url(#accentGrad)" stroke-width="24" stroke-linecap="round" opacity="0.3" />
  <path d="M 320 140 L 160 380" stroke="url(#accentGrad)" stroke-width="24" stroke-linecap="round" opacity="0.3" />

  <g filter="url(#glow)">
    <line x1="256" y1="120" x2="256" y2="380" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
    <path d="M 150 150 L 256 256" stroke="#48dbfb" stroke-width="14" stroke-linecap="round" />
    <path d="M 362 150 L 256 256" stroke="#ff9f43" stroke-width="14" stroke-linecap="round" />
    <path d="M 256 256 L 150 362" stroke="#ff6b6b" stroke-width="14" stroke-linecap="round" />
    <path d="M 256 256 L 330 330 C 350 350, 360 370, 330 390 C 310 400, 270 390, 260 370" stroke="#1dd1a1" stroke-width="14" stroke-linecap="round" fill="none" />
  </g>

  <g fill="none" stroke-linecap="round" filter="url(#glow)">
    <path d="M 216 80 A 50 50 0 0 1 296 80" stroke="#48dbfb" stroke-width="8" opacity="0.9"/>
    <path d="M 186 50 A 90 90 0 0 1 326 50" stroke="#ff9f43" stroke-width="6" opacity="0.7"/>
    <path d="M 156 20 A 130 130 0 0 1 356 20" stroke="#ff6b6b" stroke-width="4" opacity="0.4"/>
  </g>

  <circle cx="256" cy="120" r="12" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="256" cy="120" r="6" fill="#ff9f43"/>

  <text x="256" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff" letter-spacing="4" text-anchor="middle" opacity="0.9">
    XLOG<tspan fill="#ff9f43">2</tspan>
  </text>
</svg>
