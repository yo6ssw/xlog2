name: syncd portable

# Portable xlog2-syncd tarballs for x86-64 and arm64 — for Debian, Raspberry Pi
# OS and anything the Ubuntu-only PPA doesn't cover. Built on Ubuntu 22.04
# (glibc 2.35) so the arm64 build runs on Raspberry Pi OS bookworm and newer.
# syncd is toolkit-free and depends only on sqlite3/curl/sodium at runtime.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  portable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64,  runner: ubuntu-22.04 }
          - { arch: aarch64, runner: ubuntu-22.04-arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies (no Qt/GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            libsqlite3-dev libhamlib-dev libcurl4-openssl-dev libopus-dev \
            libasound2-dev libpipewire-0.3-dev libdbus-1-dev libsodium-dev

      - name: Build portable tarball
        run: |
          ver="${GITHUB_REF_NAME#v}"
          [ -n "$ver" ] || ver="$(git describe --tags --always 2>/dev/null || echo dev)"
          VER="$ver" ARCH="${{ matrix.arch }}" packaging/build-syncd-portable.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: xlog2-syncd-${{ matrix.arch }}
          path: xlog2-syncd-*-linux-*.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: xlog2-syncd-*-linux-*.tar.gz
